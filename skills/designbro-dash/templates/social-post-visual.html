<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;           /* adjust for format: 1920 for stories, 1350 for vertical */
    background: #0a0a0f;      /* Ink — always use this, not #1a1a2e */
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* === LAYERS (z-index 0) === */
  .grid-bg {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(212,168,83,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }
  .circuit-h {
    position: absolute; top: 280px; left: 0; width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,168,83,0.08) 20%, rgba(212,168,83,0.08) 80%, transparent);
    z-index: 0;
  }
  .glow {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%);
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(ACCENT_R,ACCENT_G,ACCENT_B,0.12) 0%, transparent 70%);
    z-index: 0;
  }

  /* === CONTENT (z-index 1) === */
  .container {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px;
  }

  /* Icon circle */
  .icon-circle {
    width: 220px; height: 220px; border-radius: 50%;
    background: rgba(ACCENT_R,ACCENT_G,ACCENT_B,0.08);
    border: 2px solid rgba(ACCENT_R,ACCENT_G,ACCENT_B,0.2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 40px; position: relative;
  }
  .icon-circle::after {
    content: ''; position: absolute; inset: -8px; border-radius: 50%;
    border: 1px solid rgba(ACCENT_R,ACCENT_G,ACCENT_B,0.06);
  }
  .icon-emoji { font-size: 100px; line-height: 1; }

  /* Typography */
  .bot-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 48px; font-weight: 700;
    color: #ACCENT_HEX;           /* bot accent color */
    letter-spacing: -1px;
    margin-bottom: 12px; text-align: center;
  }
  .bot-role {
    font-size: 20px; font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 6px; text-transform: uppercase;
    margin-bottom: 32px; text-align: center;
  }
  .divider {
    width: 60px; height: 2px;
    background: #ACCENT_HEX;
    margin-bottom: 32px; opacity: 0.6;
  }
  .tagline {
    font-size: 22px; color: rgba(255,255,255,0.7);
    text-align: center; line-height: 1.5; max-width: 600px;
  }
  .tagline em { color: #ACCENT_HEX; font-style: normal; font-weight: 600; }

  /* === OVERLAYS === */
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, transparent, #ACCENT_HEX, transparent);
    opacity: 0.4; z-index: 2;
  }
  .badge {
    position: absolute; top: 40px; left: 50px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: rgba(ACCENT_R,ACCENT_G,ACCENT_B,0.5);
    letter-spacing: 3px; text-transform: uppercase; z-index: 2;
  }
  .logo-area {
    position: absolute; bottom: 40px; right: 50px;
    display: flex; align-items: center; gap: 10px; z-index: 2;
  }
  .logo-mark { width: 32px; height: 32px; }
  .logo-text {
    font-family: 'Inter', sans-serif; font-size: 14px;
    color: rgba(255,255,255,0.3); font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="circuit-h"></div>
  <div class="glow"></div>

  <div class="badge">HERMES BOTS • SPOTLIGHT</div>

  <div class="container">
    <div class="icon-circle">
      <span class="icon-emoji">🐸</span>
      <!-- Optional: bot-specific symbol overlay -->
    </div>

    <div class="bot-name">BotName</div>
    <div class="bot-role">Role description</div>

    <div class="divider"></div>

    <div class="tagline">
      <em>Keyword 1</em> • <em>Keyword 2</em> • <em>Keyword 3</em>
    </div>
  </div>

  <div class="bottom-bar"></div>

  <div class="logo-area">
    <svg class="logo-mark" viewBox="0 0 160 160" fill="none">
      <path d="M80 20 L60 60 L20 60 L50 85 L40 130 L80 105 L120 130 L110 85 L140 60 L100 60 Z"
            stroke="#d4a853" stroke-width="2" fill="none" opacity="0.4"/>
    </svg>
    <span class="logo-text">Hermes Bots</span>
  </div>
</body>
</html>
